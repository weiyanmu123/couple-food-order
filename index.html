<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>屎壳郎的情侣厨房</title>
  <link rel="icon" href="assets/avatar.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body autocomplete="off">
  <main class="phone">
    <!-- Header -->
    <header class="shop-header">
      <div class="top-row">
        <h1>屎壳郎的情侣厨房</h1>
      </div>

      <div class="search-row">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35"/>
        </svg>
        <input id="searchInput" placeholder="搜索想吃的菜" />
        <button type="button" id="clearSearch" aria-label="清空搜索" hidden>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <section class="shop-card">
        <img class="avatar" src="assets/avatar.svg" alt="店铺头像" />
        <div class="shop-info">
          <strong>屎壳郎的情侣厨房</strong>
          <span>爱她就给做饭吧</span>
        </div>
        <div class="shop-actions">
          <button type="button" id="editShop">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
            编辑
          </button>
          <button type="button" id="openAddDish">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <path d="M12 5v14M5 12h14"/>
            </svg>
            添加
          </button>
        </div>
      </section>
    </header>

    <!-- Main Content -->
    <section class="content">
      <aside class="category-list" id="categoryList"></aside>

      <section class="dish-panel">
        <h2 id="categoryTitle">蔬菜</h2>
        <div class="dish-list" id="dishList"></div>
      </section>
    </section>

    <!-- Bottom Navigation -->
    <nav class="bottom-tabs">
      <button class="tab active" type="button">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 11h18M3 6h18M3 16h18"/>
        </svg>
        <span class="tab-label">菜单</span>
        <span class="cart-badge" id="cartCount">0</span>
      </button>
      <button class="tab" type="button">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 0 1-8 0"/>
        </svg>
        <span class="tab-label">订单</span>
      </button>
      <button class="tab" type="button">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <span class="tab-label">我的</span>
      </button>
    </nav>
  </main>

  <!-- Add Dish Dialog -->
  <dialog id="dishDialog" class="dish-dialog">
    <form id="dishForm" method="dialog">
      <div class="dialog-head">
        <h3>添加菜品</h3>
        <button type="button" id="closeDialog" aria-label="关闭" class="dialog-close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <label>菜名<input id="dishName" maxlength="24" placeholder="比如：清炒西兰花" required /></label>

      <label>分类<select id="dishCategory"></select></label>

      <label>配料/说明<input id="dishDesc" maxlength="38" placeholder="比如：西兰花、蒜末" /></label>

      <label>图片
        <div class="image-picker">
          <img id="dialogPreview" alt="" hidden />
          <div id="dialogHint" class="image-hint">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
            <span>选择本地图片</span>
          </div>
          <input id="dishImage" type="file" accept="image/*" required />
        </div>
      </label>

      <button class="save-button primary" type="submit">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        保存到菜单
      </button>
    </form>
  </dialog>

  <!-- Order Dialog -->
  <dialog id="orderDialog" class="order-dialog">
    <div class="order-sheet">
      <div class="dialog-head">
        <h3>今日想吃</h3>
        <button type="button" id="closeOrderDialog" aria-label="关闭" class="dialog-close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div id="orderItems" class="order-items"></div>
      <textarea id="orderMessage" readonly autocomplete="off"></textarea>
      <div class="order-actions">
        <button class="save-button ghost" id="clearCart" type="button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
          清空
        </button>
        <button class="save-button primary" id="sendToBoyfriend" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
          发送给男朋友
        </button>
      </div>
      <p id="sendTip" class="send-tip" hidden></p>
    </div>
  </dialog>

  <!-- Profile Dialog -->
  <dialog id="profileDialog" class="profile-dialog">
    <form id="profileForm" class="profile-sheet" method="dialog">
      <div class="dialog-head">
        <h3>我的名字</h3>
        <button type="button" id="closeProfileDialog" aria-label="关闭" class="dialog-close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <div class="profile-card">
        <label class="profile-avatar-upload" id="avatarUpload">
          <img id="avatarPreview" class="profile-avatar-img" src="assets/avatar.svg" alt="头像">
          <span class="avatar-edit-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </span>
          <input type="file" id="profileAvatar" accept="image/*">
        </label>
        <div>
          <strong id="profilePreviewName">我的名字</strong>
          <span id="profilePreviewTaste">点菜单会显示他的名字</span>
        </div>
      </div>

      <label>对象昵称<input id="profileName" maxlength="16" placeholder="比如：屎壳郎" /></label>
      <label>我的口味<input id="profileTaste" maxlength="30" placeholder="比如：少辣、不要香菜" /></label>
      <label>忌口<input id="profileAvoid" maxlength="30" placeholder="比如：不吃葱姜蒜" /></label>
      <label>给对象的话<textarea id="profileNote" maxlength="80" placeholder="比如：快点做饭，我饿啦"></textarea></label>

      <button class="save-button primary" type="submit">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        保存设置
      </button>
      <p id="profileTip" class="send-tip" hidden></p>
    </form>
  </dialog>

  <!-- Category Dialog -->
  <dialog id="categoryDialog" class="category-dialog">
    <form id="categoryForm" class="category-sheet" method="dialog">
      <div class="dialog-head">
        <h3>分类管理</h3>
        <button type="button" id="closeCategoryDialog" aria-label="关闭" class="dialog-close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <label>新分类
        <div class="category-add-row">
          <input id="categoryName" maxlength="8" placeholder="比如：甜品" />
          <button class="save-button primary small" type="submit">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <path d="M12 5v14M5 12h14"/>
            </svg>
            添加
          </button>
        </div>
      </label>
      <div id="categoryManageList" class="category-manage-list"></div>
      <p class="more-copy">默认分类会保留；你添加的分类可以删除，分类里的自定义菜会一起移除。</p>
    </form>
  </dialog>

  <!-- Toast -->
  <dialog id="toastDialog" class="toast-dialog">
    <p id="toastText"></p>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
